<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Bruno Albín</title>
  <meta name="robots" content="noindex" />
  <style>
    :root { --bg: #060d1f; --cyan: #00d4ff; --gray: #94a3b8; --mono: 'JetBrains Mono', monospace; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--gray);
      font-family: var(--mono), monospace;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    h1 { font-size: clamp(4rem, 15vw, 8rem); color: var(--cyan); line-height: 1; margin-bottom: .5rem; }
    p  { font-size: 1rem; margin-bottom: 2rem; }
    a  {
      color: var(--cyan); text-decoration: none;
      border: 1px solid var(--cyan); padding: .6rem 1.4rem; border-radius: 4px;
      transition: background .2s;
    }
    a:hover { background: rgba(0,212,255,.1); }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>// Esta página no existe o fue movida.</p>
    <a href="/mi-portfolio/">← Volver al inicio</a>
  </div>
</body>
</html>
